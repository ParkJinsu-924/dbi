syntax = "proto3";
package Proto;

// Client -> Login Server
message C_Login {
    string username = 1;
    string password = 2;
}

// Login Server -> Client
// Sent only on successful login. Failure is signalled via S_Error (game.proto).
message S_Login {
    string token = 1;
    string game_server_ip = 2;
    int32 game_server_port = 3;
}
