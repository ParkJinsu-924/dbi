syntax = "proto3";
package Proto;

// 2D 평면 좌표/방향 벡터. LoL 식 top-down MMO 기본 좌표계.
// 세계는 전부 2D 로 처리 — 수직 축이 필요한 NavMesh 쿼리 등은 서버 내부에서 y=0 를 채워 호출.
message Vector2 {
    float x = 1;
    float y = 2;
}

message Timestamp {
    int64 epoch_ms = 1;
}

// Common error codes shared by client/server. 0 = success.
// Used by S_Error packet (game.proto) and any handler that returns ErrorCode.
enum ErrorCode {
    OK = 0;
    UNKNOWN = 1;

    // Auth / session
    LOGIN_SERVER_OFFLINE = 100;
    TOKEN_INVALID = 101;
    TOKEN_EXPIRED = 102;

    // Game state
    PLAYER_NOT_FOUND = 200;
    INVALID_POSITION = 201;

    // Generic
    INVALID_REQUEST = 900;
    INTERNAL_ERROR = 901;
}
