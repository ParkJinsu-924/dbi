syntax = "proto3";
package Proto;

import "common.proto";

// Client -> Game Server
message C_EnterGame {
    string token = 1;
}

// Deprecated: 기존 위치 직접 송신 방식. 신규 클라이언트는 C_MoveCommand 사용.
// 서버가 완전히 전환되면 이 메시지와 핸들러를 제거한다.
message C_PlayerMove {
    Vector3 position = 1;
    float yaw = 2;
}

message C_Chat {
    string message = 1;
}

message C_RequestUseSkill {
    int32 skill_id = 1;    	    // SkillTemplate.sid 으로 룩업
    Vector3 dir = 2;            // Skillshot 정규화 방향. Homing/Point-click/Ground-target 시 무시
    int64 target_guid = 3;      // Homing/Point-click 대상. 0이면 서버 자동 선택(Homing 전용)
    Vector3 target_pos = 4;     // Ground-target 대상 지점 (스킬 타입별로 해석)
}

// League of Legends 스타일 클릭 이동 명령.
// 서버가 받으면 Player.destination 에 저장하고, 게임 tick에서 직선으로 접근시킨다.
message C_MoveCommand {
    Vector3 target_pos = 1;     // 월드 좌표 목적지
}

// 현재 이동을 중단한다 (LoL 의 S 키 동작).
message C_StopMove {
}

// Game Server -> Client
// Note: success path uses typed S_* packet. Failure path is signalled via S_Error
// (see below) — these messages no longer carry per-packet success flags.

message S_EnterGame {
    int32 player_id = 1;
    Vector3 spawn_position = 2;
    int64 guid = 3;              // 본인 GameObject GUID — 서버 측 식별자 (Projectile target_guid 매칭용)
}

// 공통 Player DTO — S_PlayerSpawn / S_PlayerList 에서 재사용.
message PlayerInfo {
    int32 player_id = 1;
    string name = 2;
    Vector3 position = 3;
    int64 guid = 4;              // 해당 플레이어의 GameObject GUID
}

message S_PlayerList {
    repeated PlayerInfo players = 1;
}

message S_PlayerMove {
    int32 player_id = 1;
    Vector3 position = 2;
    float yaw = 3;
}

message S_Chat {
    int32 player_id = 1;
    string sender = 2;
    string message = 3;
}

message S_PlayerLeave {
    int32 player_id = 1;
}

// 신규 유저가 Zone에 입장했음을 Zone 내 기존 유저들에게 알림.
// 본인도 같은 패킷을 받으므로 클라는 자기 player_id 는 skip.
message S_PlayerSpawn {
    PlayerInfo player = 1;
}

message S_RequestUseSkill {
    int32 range = 1;
}

// Server corrects client position when move target is invalid
message S_MoveCorrection {
    Vector3 position = 1;
}

// Generic error response. Sent automatically by the dispatcher when a handler
// returns a non-OK ErrorCode. source_packet_id identifies the original request.
message S_Error {
    uint32 source_packet_id = 1;
    ErrorCode code = 2;
    string detail = 3;
}

// --- Monster ---

// 공통 Monster DTO — S_MonsterSpawn / S_MonsterList 에서 재사용.
message MonsterInfo {
    int64 guid = 1;
    string name = 2;
    Vector3 position = 3;
    float detect_range = 4;
    int32 hp = 5;
    int32 max_hp = 6;
}

message S_MonsterSpawn {
    MonsterInfo monster = 1;
}

message S_MonsterMove {
    int64 guid = 1;
    Vector3 position = 2;
}

message S_MonsterDespawn {
    int64 guid = 1;
}

message S_MonsterList {
    repeated MonsterInfo monsters = 1;
}

message S_MonsterState {
    int64 guid = 1;
    uint32 state = 2;           // 0=Idle, 1=Chase, 2=Attack, 3=Return
    int64 target_guid = 3;      // Chase/Attack target player GUID
}

message S_MonsterAttack {
    int64 monster_guid = 1;
    int64 target_guid = 2;
    int32 damage = 3;
}

message S_HitscanAttack {
    int64 attacker_guid = 1;
    int64 target_guid = 2;
    Vector3 start_position = 3;
    Vector3 hit_position = 4;
    int32 damage = 5;
}

// Unit(Player/Monster/NPC 등 HP를 가진 모든 GameObject) 의 HP 변경을 알리는 범용 패킷.
// guid 로 대상 식별하므로 수신 측이 자기 자신/다른 플레이어/몬스터 모두 동일 로직으로 처리한다.
message S_UnitHp {
    int32 hp = 1;
    int32 max_hp = 2;
    int64 guid = 3;
}

// --- Projectile ---

enum ProjectileKind {
    PROJECTILE_HOMING = 0;
    PROJECTILE_SKILLSHOT = 1;
}

message S_ProjectileSpawn {
    int64 guid = 1;
    int64 owner_guid = 2;
    ProjectileKind kind = 3;
    Vector3 start_pos = 4;
    float speed = 5;
    int64 target_guid = 6;      // Homing 전용
    Vector3 dir = 7;             // Skillshot 전용
    float radius = 8;            // Skillshot 전용
    float max_range = 9;         // Skillshot 전용
    float max_lifetime = 10;     // Homing 전용
}

message S_ProjectileHit {
    int64 projectile_guid = 1;
    int64 target_guid = 2;
    int32 damage = 3;
    Vector3 hit_pos = 4;
}

message S_ProjectileDestroy {
    enum Reason {
        EXPIRED = 0;
        TARGET_LOST = 1;
        HIT = 2;
    }
    int64 projectile_guid = 1;
    Reason reason = 2;
}
