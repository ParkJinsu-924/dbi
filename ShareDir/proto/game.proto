syntax = "proto3";
package Proto;

import "common.proto";

// Client -> Game Server
message C_EnterGame {
    string token = 1;
}

message C_PlayerMove {
    Vector3 position = 1;
    float yaw = 2;
}

message C_Chat {
    string message = 1;
}

message C_RequestUseSkill {
    string skillId = 1;
}

// Game Server -> Client
// Note: success path uses typed S_* packet. Failure path is signalled via S_Error
// (see below) — these messages no longer carry per-packet success flags.

message S_EnterGame {
    int32 player_id = 1;
    Vector3 spawn_position = 2;
}

message S_PlayerList {
    message PlayerInfo {
        int32 player_id = 1;
        string name = 2;
        Vector3 position = 3;
    }
    repeated PlayerInfo players = 1;
}

message S_PlayerMove {
    int32 player_id = 1;
    Vector3 position = 2;
    float yaw = 3;
}

message S_Chat {
    int32 player_id = 1;
    string sender = 2;
    string message = 3;
}

message S_PlayerLeave {
    int32 player_id = 1;
}

message S_RequestUseSkill {
    int32 range = 1;
}

// Server corrects client position when move target is invalid
message S_MoveCorrection {
    Vector3 position = 1;
}

// Generic error response. Sent automatically by the dispatcher when a handler
// returns a non-OK ErrorCode. source_packet_id identifies the original request.
message S_Error {
    uint32 source_packet_id = 1;
    ErrorCode code = 2;
    string detail = 3;
}

// --- Monster ---

message S_MonsterSpawn {
    int64 guid = 1;
    string name = 2;
    Vector3 position = 3;
}

message S_MonsterMove {
    int64 guid = 1;
    Vector3 position = 2;
}

message S_MonsterDespawn {
    int64 guid = 1;
}

message S_MonsterList {
    message MonsterInfo {
        int64 guid = 1;
        string name = 2;
        Vector3 position = 3;
    }
    repeated MonsterInfo monsters = 1;
}

message S_MonsterState {
    int64 guid = 1;
    uint32 state = 2;           // 0=Idle, 1=Chase, 2=Attack, 3=Return
    int64 target_guid = 3;      // Chase/Attack target player GUID
}

message S_MonsterAttack {
    int64 monster_guid = 1;
    int64 target_guid = 2;
    int32 damage = 3;
}

message S_PlayerHp {
    int32 hp = 1;
    int32 max_hp = 2;
}
