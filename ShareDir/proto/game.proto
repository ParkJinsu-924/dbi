syntax = "proto3";
package Proto;

import "common.proto";

// Client -> Game Server
message C_EnterGame {
    string token = 1;
}

// 클라이언트가 매 tick 자기 위치/yaw 를 서버에 송신.
// 클라이언트 권위 이동 — 서버는 받은 좌표를 다른 플레이어에게 S_PlayerMove 로 브로드캐스트.
message C_PlayerMove {
    Vector2 position = 1;
    float yaw = 2;
}

message C_Chat {
    string message = 1;
}

message C_UseSkill {
    int32 skill_id = 1;    	    // SkillTemplate.sid 으로 룩업
    Vector2 dir = 2;            // Skillshot 정규화 방향. Homing/Point-click/Ground-target 시 무시
    int64 target_guid = 3;      // Homing/Point-click 대상. 0이면 서버 자동 선택(Homing 전용)
    Vector2 target_pos = 4;     // Ground-target 대상 지점 (스킬 타입별로 해석)
}

// League of Legends 스타일 클릭 이동 명령.
// 서버가 받으면 Player.destination 에 저장하고, 게임 tick에서 직선으로 접근시킨다.
message C_MoveCommand {
    Vector2 target_pos = 1;     // 월드 좌표 목적지
}

// 현재 이동을 중단한다 (LoL 의 S 키 동작).
message C_StopMove {
}

// Game Server -> Client
// Note: success path uses typed S_* packet. Failure path is signalled via S_Error
// (see below) — these messages no longer carry per-packet success flags.

message S_EnterGame {
    int32 player_id = 1;
    Vector2 spawn_position = 2;
    int64 guid = 3;              // 본인 GameObject GUID — 서버 측 식별자 (Projectile target_guid 매칭용)
}

// 공통 Player DTO — S_PlayerSpawn / S_PlayerList 에서 재사용.
message PlayerInfo {
    int32 player_id = 1;
    string name = 2;
    Vector2 position = 3;
    int64 guid = 4;              // 해당 플레이어의 GameObject GUID
}

message S_PlayerList {
    repeated PlayerInfo players = 1;
}

message S_PlayerMove {
    int32 player_id = 1;
    Vector2 position = 2;
    float yaw = 3;
}

// Unit 한 개의 위치 업데이트. guid 로 대상 식별 (클라가 Spawn 시점에 guid↔type 매핑 보유).
message UnitPosition {
    int64 guid = 1;
    Vector2 position = 2;
    float yaw = 3;          // Monster 등 yaw 미사용 타입은 0
}

// 주기적 위치 방송 — Player/Monster 같은 Unit 의 현재 위치를 묶어 전송.
// 이산 이벤트 (Spawn/Leave/SkillHit/Hp 등) 는 여전히 개별 패킷 사용.
// 타입 식별은 수신측이 guid 로 lookup (Spawn 시점에 guid↔type 매핑 보유).
//
// Projectile 은 포함하지 않는다:
//   - Spawn 시 전달한 초기 파라미터 (start_pos, dir, speed, target_guid 등) 로
//     클라가 로컬 시뮬레이션. 권위는 판정(S_SkillHit)에만.
//   - 빠른 객체를 10Hz 로 뿌리면 시각적으로 점프하고, 대역 폭증.
message S_UnitPositions {
    uint32 server_tick = 1;                 // 클라 보간/순서 보장용 서버측 tick 카운터
    repeated UnitPosition units = 2;
}

message S_Chat {
    int32 player_id = 1;
    string sender = 2;
    string message = 3;
}

message S_PlayerLeave {
    int32 player_id = 1;
}

// 신규 유저가 Zone에 입장했음을 Zone 내 기존 유저들에게 알림.
// 본인도 같은 패킷을 받으므로 클라는 자기 player_id 는 skip.
message S_PlayerSpawn {
    PlayerInfo player = 1;
}

message S_RequestUseSkill {
    int32 range = 1;
}

// Server corrects client position when move target is invalid
message S_MoveCorrection {
    Vector2 position = 1;
}

// Generic error response. Sent automatically by the dispatcher when a handler
// returns a non-OK ErrorCode. source_packet_id identifies the original request.
message S_Error {
    uint32 source_packet_id = 1;
    ErrorCode code = 2;
    string detail = 3;
}

// --- Monster ---

// 공통 Monster DTO — S_MonsterSpawn / S_MonsterList 에서 재사용.
// name 은 서버가 소유하지 않는다. 클라는 tid 로 monster_templates.csv 조회해 이름/스프라이트 결정.
message MonsterInfo {
    int64 guid = 1;
    int32 tid = 2;
    Vector2 position = 3;
    float detect_range = 4;
    int32 hp = 5;
    int32 max_hp = 6;
}

message S_MonsterSpawn {
    MonsterInfo monster = 1;
}

message S_MonsterMove {
    int64 guid = 1;
    Vector2 position = 2;
}

message S_MonsterDespawn {
    int64 guid = 1;
}

message S_MonsterList {
    repeated MonsterInfo monsters = 1;
}

message S_MonsterState {
    int64 guid = 1;
    uint32 state = 2;           // 0=Idle, 1=Patrol, 2=Engage, 3=Return (MonsterStateId enum)
    int64 target_guid = 3;      // Engage 중일 때 현재 target player GUID
}

// 모든 유닛의 "스킬 적중" 을 단일 패킷으로 표현한다.
// Melee/Hitscan/Homing/Skillshot 모두 caster 가 target 에게 skill_id 효과를 가한 순간을 뜻한다.
// 클라이언트는 skill_id 로 SkillTemplate 을 조회해 시각 연출(라인/이펙트/애니메이션) 을 결정한다.
// caster_pos 는 Hitscan 라인 렌더링처럼 시작점이 필요한 경우에 사용, 다른 타입은 장식용.
// hit_pos 는 데미지 팝업/이펙트 위치.
message S_SkillHit {
    int64   caster_guid = 1;
    int64   target_guid = 2;
    int32   skill_id    = 3;
    int32   damage      = 4;
    Vector2 caster_pos  = 5;
    Vector2 hit_pos     = 6;
}

// Unit(Player/Monster/NPC 등 HP를 가진 모든 GameObject) 의 HP 변경을 알리는 범용 패킷.
// guid 로 대상 식별하므로 수신 측이 자기 자신/다른 플레이어/몬스터 모두 동일 로직으로 처리한다.
message S_UnitHp {
    int32 hp = 1;
    int32 max_hp = 2;
    int64 guid = 3;
}

// --- Projectile ---

enum ProjectileKind {
    PROJECTILE_HOMING = 0;
    PROJECTILE_SKILLSHOT = 1;
}

message S_ProjectileSpawn {
    int64 guid = 1;
    int64 owner_guid = 2;
    ProjectileKind kind = 3;
    Vector2 start_pos = 4;
    float speed = 5;
    int64 target_guid = 6;      // Homing 전용
    Vector2 dir = 7;             // Skillshot 전용
    float radius = 8;            // Skillshot 전용
    float max_range = 9;         // Skillshot 전용
    float max_lifetime = 10;     // Homing 전용
    int32 skill_id = 11;         // 시전 스킬 sid — 클라가 skill_templates.csv 조회로 시각 구분용
}

// ─── Buff / Effect 상태 동기화 ─────────────────────────────────────
// 서버가 Unit 에 Buff 를 부착하거나 해제할 때 브로드캐스트.
// 클라는 eid 로 effects.csv 조회해 아이콘/파티클/지속시간 UI 처리.
message S_BuffApplied {
    int64 target_guid = 1;
    int32 eid         = 2;
    int64 caster_guid = 3;
    float duration    = 4;    // 부여 시점 기준 총 지속시간(초). refresh 된 경우도 동일.
}

message S_BuffRemoved {
    int64 target_guid = 1;
    int32 eid         = 2;
}

message S_ProjectileDestroy {
    enum Reason {
        EXPIRED = 0;
        TARGET_LOST = 1;
        HIT = 2;
    }
    int64 projectile_guid = 1;
    Reason reason = 2;
}
